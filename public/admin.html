<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - NK's Yams</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #FDF6EC;
      color: #2C1A0E;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #7B3F00 0%, #4A2200 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
    }

    .logo span {
      color: #D4920A;
    }

    .refresh-btn {
      background: #D4920A;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .refresh-btn:hover {
      background: #B8780A;
    }

    /* Main Content */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px;
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .stat-title {
      color: #7B3F00;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: #D4920A;
    }

    /* Filters */
    .filters-bar {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-group {
      flex: 1;
      min-width: 200px;
    }

    .filter-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #7B3F00;
      margin-bottom: 6px;
    }

    .filter-group select, 
    .filter-group input {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #EDE0CE;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      background: #FDF6EC;
    }

    /* Orders Table */
    .orders-table-container {
      background: white;
      border-radius: 16px;
      overflow-x: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 16px;
      background: #FDF6EC;
      color: #7B3F00;
      font-weight: 600;
      font-size: 0.85rem;
      border-bottom: 2px solid #EDE0CE;
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid #EDE0CE;
    }

    tr:hover {
      background: #FDF6EC;
    }

    /* Status Badges */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .status-pending { background: #FFF3E0; color: #FF9800; }
    .status-confirmed { background: #E3F2FD; color: #2196F3; }
    .status-dispatched { background: #E8F5E9; color: #4CAF50; }
    .status-delivered { background: #E0F2F1; color: #009688; }
    .status-cancelled { background: #FFEBEE; color: #F44336; }

    /* Buttons */
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      margin: 2px;
      transition: all 0.2s;
    }

    .btn-status {
      background: #D4920A;
      color: white;
    }

    .btn-status:hover {
      background: #B8780A;
    }

    .btn-delete {
      background: #F44336;
      color: white;
    }

    .btn-delete:hover {
      background: #D32F2F;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: #7B3F00;
    }

    .error-message {
      background: #FFEBEE;
      color: #F44336;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #4CAF50;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      animation: slideIn 0.3s ease-out;
      z-index: 1000;
    }

    .toast.error {
      background: #F44336;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (max-width: 768px) {
      .container { padding: 15px; }
      .stats-grid { grid-template-columns: 1fr; }
      th, td { padding: 8px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">NK's<span>YAM</span></div>
    <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh</button>
  </div>

  <!-- Main Content -->
  <div class="container">
    <h1 style="margin-bottom: 24px;">📊 Admin Dashboard</h1>

    <!-- Statistics Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-title">Total Orders</div>
        <div class="stat-value" id="totalOrders">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">Total Revenue</div>
        <div class="stat-value" id="totalRevenue">₦0</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">Pending Orders</div>
        <div class="stat-value" id="pendingOrders">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">Completed</div>
        <div class="stat-value" id="completedOrders">0</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <div class="filter-group">
        <label>📋 Filter by Status</label>
        <select id="statusFilter" onchange="filterOrders()">
          <option value="all">All Orders</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="dispatched">Dispatched</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div class="filter-group">
        <label>🔍 Search</label>
        <input type="text" id="searchInput" placeholder="Name or phone..." onkeyup="filterOrders()">
      </div>
    </div>

    <!-- Orders Table -->
    <div class="orders-table-container">
      <div id="ordersContent">
        <div class="loading">Loading orders...</div>
      </div>
    </div>
  </div>

  <script>
    // Simple password protection
    const ADMIN_PASSWORD = 'Nwauwankeiruka1981'; // Change this to something strong
    const userPassword = prompt('Enter admin password:');
    
    if (userPassword !== ADMIN_PASSWORD) {
      document.body.innerHTML = '<h1 style="text-align:center; margin-top:50px;">🔒 Access Denied</h1>';
      throw new Error('Unauthorized access');
    }
    // Python backend URL
    const API_BASE_URL = 'https://nk-s-premium-sale.onrender.com';
    let allOrders = [];

    // Show toast notification
    function showToast(message, isError = false) {
      const toast = document.createElement('div');
      toast.className = 'toast' + (isError ? ' error' : '');
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Load orders from backend
    async function loadOrders() {
      try {
        showLoading();
        
        const response = await fetch(`${API_BASE_URL}/api/orders`);
        const data = await response.json();
        
        if (data.success) {
          allOrders = data.orders;
          updateStatistics();
          displayOrders();
          showToast('✅ Orders refreshed successfully');
        } else {
          throw new Error('Failed to load orders');
        }
      } catch (error) {
        console.error('Error:', error);
        showError('⚠️ Cannot connect to server. Make sure Python backend is running (python app.py)');
      }
    }

    // Update statistics
    function updateStatistics() {
      const total = allOrders.length;
      const revenue = allOrders.reduce((sum, order) => sum + (order.totalPrice || 0), 0);
      const pending = allOrders.filter(o => o.status === 'pending').length;
      const completed = allOrders.filter(o => o.status === 'delivered').length;

      document.getElementById('totalOrders').textContent = total;
      document.getElementById('totalRevenue').textContent = '₦' + revenue.toLocaleString('en-NG');
      document.getElementById('pendingOrders').textContent = pending;
      document.getElementById('completedOrders').textContent = completed;
    }

    // Filter orders
    function filterOrders() {
      displayOrders();
    }

    // Display orders in table
    function displayOrders() {
      const statusFilter = document.getElementById('statusFilter').value;
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();

      let filtered = [...allOrders];

      // Apply status filter
      if (statusFilter !== 'all') {
        filtered = filtered.filter(o => o.status === statusFilter);
      }

      // Apply search filter
      if (searchTerm) {
        filtered = filtered.filter(o => 
          (o.customerName && o.customerName.toLowerCase().includes(searchTerm)) ||
          (o.phone && o.phone.includes(searchTerm)) ||
          (o.orderId && o.orderId.toLowerCase().includes(searchTerm))
        );
      }

      if (filtered.length === 0) {
        document.getElementById('ordersContent').innerHTML = `
          <div style="text-align: center; padding: 60px; color: #999;">
            📭 No orders found
          </div>
        `;
        return;
      }

      // Build table HTML
      let html = `
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Phone</th>
              <th>Yam Type</th>
              <th>Price</th>
              <th>Qty</th>
              <th>Total</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
      `;

      filtered.forEach(order => {
        html += `
          <tr>
            <td><strong>#${order.orderId || 'N/A'}</strong></td>
            <td>${escapeHtml(order.customerName || 'N/A')}</td>
            <td>${order.phone || 'N/A'}</td>
            <td>${order.yamType || 'N/A'}</td>
            <td>₦${(order.pricePerTuber || 0).toLocaleString('en-NG')}</td>
            <td>${order.quantity || 0}</td>
            <td><strong>₦${(order.totalPrice || 0).toLocaleString('en-NG')}</strong></td>
            <td>
              <span class="status-badge status-${order.status || 'pending'}">
                ${order.status || 'pending'}
              </span>
            </td>
            <td>
              <button class="btn btn-status" onclick="updateStatus('${order.orderId}')">
                Update
              </button>
              <button class="btn btn-delete" onclick="deleteOrder('${order.orderId}')">
                Delete
              </button>
            </td>
          </tr>
        `;
      });

      html += `
          </tbody>
         </table>
      `;

      document.getElementById('ordersContent').innerHTML = html;
    }

    // ============================================================
    // DELETE ORDER FUNCTION - This removes from orders.json
    // ============================================================
    async function deleteOrder(orderId) {
      // Confirm with user before deleting
      const confirmed = confirm(`⚠️ Are you sure you want to delete order #${orderId}?\n\nThis action cannot be undone!`);
      
      if (!confirmed) {
        return;
      }
      
      try {
        // Send DELETE request to Python backend
        const response = await fetch(`${API_BASE_URL}/api/orders/${orderId}`, {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json'
          }
        });
        
        const data = await response.json();
        
        if (data.success) {
          // Show success message
          showToast(`✅ Order #${orderId} deleted successfully from orders.json`);
          
          // Reload the orders list (this will fetch fresh data from orders.json)
          await loadOrders();
          
          // Also reload statistics
          updateStatistics();
        } else {
          showToast(`❌ Failed to delete order #${orderId}: ${data.message}`, true);
        }
      } catch (error) {
        console.error('Delete error:', error);
        showToast('⚠️ Error deleting order. Make sure server is running.', true);
      }
    }

    // ============================================================
    // UPDATE ORDER STATUS - This updates orders.json
    // ============================================================
    async function updateStatus(orderId) {
      const newStatus = prompt('Enter new status:\npending\nconfirmed\ndispatched\ndelivered\ncancelled', 'confirmed');
      
      if (!newStatus) return;
      
      const validStatuses = ['pending', 'confirmed', 'dispatched', 'delivered', 'cancelled'];
      if (!validStatuses.includes(newStatus)) {
        showToast('❌ Invalid status! Use: ' + validStatuses.join(', '), true);
        return;
      }
      
      try {
        const response = await fetch(`${API_BASE_URL}/api/orders/${orderId}/status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus })
        });
        
        const data = await response.json();
        
        if (data.success) {
          showToast(`✅ Order #${orderId} status updated to ${newStatus}`);
          loadOrders(); // Reload the list
        } else {
          showToast('❌ Failed to update status', true);
        }
      } catch (error) {
        showToast('⚠️ Error updating status', true);
      }
    }

    // Helper functions
    function showLoading() {
      document.getElementById('ordersContent').innerHTML = `
        <div class="loading">
          <div>🔄 Loading orders...</div>
        </div>
      `;
    }

    function showError(message) {
      document.getElementById('ordersContent').innerHTML = `
        <div class="error-message">
          ⚠️ ${message}
        </div>
      `;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Load orders when page loads
    loadOrders();
    
    // Auto-refresh every 30 seconds
    setInterval(loadOrders, 30000);
  </script>
</body>
</html>

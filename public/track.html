<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Track Your Order - NK's Yams</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #FDF6EC 0%, #FAE8C8 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    .track-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .card-header {
      background: linear-gradient(135deg, #7B3F00 0%, #4A2200 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .card-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .card-body {
      padding: 40px;
    }

    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
    }

    .search-box input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #EDE0CE;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
    }

    .search-box button {
      padding: 14px 28px;
      background: #D4920A;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .order-info {
      margin-top: 24px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #EDE0CE;
      flex-wrap: wrap;
    }

    .status-update {
      margin-top: 24px;
      padding: 16px;
      background: #E8F5E9;
      border-radius: 12px;
      text-align: center;
    }

    .timeline {
      margin: 32px 0;
    }

    .timeline-item {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
    }

    .timeline-icon {
      width: 40px;
      height: 40px;
      background: #EDE0CE;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .timeline-icon.completed {
      background: #4CAF50;
      color: white;
    }

    .timeline-icon.active {
      background: #D4920A;
      color: white;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .timeline-content {
      flex: 1;
    }

    .timeline-title {
      font-weight: 600;
    }

    .timeline-date {
      font-size: 0.75rem;
      color: #999;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #7B3F00;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      text-align: center;
    }

    @media (max-width: 640px) {
      .card-body { padding: 24px; }
      .search-box { flex-direction: column; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="track-card">
      <div class="card-header">
        <h1>🔍 Track Your Order</h1>
        <p>Enter your Order ID to check status</p>
      </div>
      <div class="card-body">
        <div class="search-box">
          <input type="text" id="orderIdInput" placeholder="Enter Order ID (e.g., A3F8B21C)" />
          <button onclick="trackOrder()">Track Order</button>
        </div>
        <div id="trackResult"></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    const urlParams = new URLSearchParams(window.location.search);
    const orderIdFromUrl = urlParams.get('orderId');
    if (orderIdFromUrl) {
      document.getElementById('orderIdInput').value = orderIdFromUrl;
      trackOrder();
    }

    async function trackOrder() {
      const orderId = document.getElementById('orderIdInput').value.trim().toUpperCase();
      if (!orderId) {
        showError('Please enter an Order ID');
        return;
      }

      showLoading();

      try {
        const response = await fetch(`${API_BASE}/api/orders/${orderId}`);
        const data = await response.json();

        if (!data.success || !data.order) {
          showError('Order not found. Please check your Order ID.');
          return;
        }

        displayOrderStatus(data.order);
      } catch (error) {
        showError('Unable to fetch order. Please try again.');
      }
    }

    function displayOrderStatus(order) {
      const resultDiv = document.getElementById('trackResult');
      
      const statusMap = {
        'pending': { text: 'Order Received', color: '#FF9800', message: 'Your order has been received and is being processed.' },
        'confirmed': { text: 'Order Confirmed', color: '#2196F3', message: 'Your order has been confirmed! We are preparing your yams.' },
        'dispatched': { text: 'Out for Delivery', color: '#4CAF50', message: 'Your yams are on the way!' },
        'delivered': { text: 'Delivered', color: '#009688', message: 'Your order has been delivered. Enjoy!' },
        'cancelled': { text: 'Cancelled', color: '#F44336', message: 'This order has been cancelled.' }
      };

      const status = statusMap[order.status] || statusMap['pending'];
      const orderDate = new Date(order.createdAt);

      const timeline = [
        { status: 'Order Placed', completed: true, date: orderDate },
        { status: 'Confirmed', completed: ['confirmed', 'dispatched', 'delivered'].includes(order.status), date: null },
        { status: 'Dispatched', completed: ['dispatched', 'delivered'].includes(order.status), date: null },
        { status: 'Delivered', completed: order.status === 'delivered', date: null }
      ];

      const timelineHtml = timeline.map((item, index) => {
        let iconClass = 'timeline-icon';
        if (item.completed) iconClass += ' completed';
        
        return `
          <div class="timeline-item">
            <div class="${iconClass}">${item.completed ? '✓' : '○'}</div>
            <div class="timeline-content">
              <div class="timeline-title">${item.status}</div>
              <div class="timeline-date">${item.date ? item.date.toLocaleDateString() : 'Pending'}</div>
            </div>
          </div>
        `;
      }).join('');

      const html = `
        <div class="order-info">
          <div class="info-row"><strong>Order ID:</strong><span>#${order.orderId}</span></div>
          <div class="info-row"><strong>Customer:</strong><span>${escapeHtml(order.customerName)}</span></div>
          <div class="info-row"><strong>Yam Type:</strong><span>${order.yamType}</span></div>
          <div class="info-row"><strong>Quantity:</strong><span>${order.quantity} tuber(s)</span></div>
          <div class="info-row"><strong>Your Price:</strong><span>₦${order.pricePerTuber.toLocaleString('en-NG')}/tuber</span></div>
          <div class="info-row"><strong>Total Amount:</strong><span>₦${order.totalPrice.toLocaleString('en-NG')}</span></div>
          <div class="info-row"><strong>Delivery Address:</strong><span>${escapeHtml(order.deliveryAddress)}</span></div>
          
          <div class="status-update" style="background: ${status.color}20; border-left: 4px solid ${status.color}">
            <strong style="color: ${status.color}">${status.text}</strong><br>${status.message}
          </div>

          <div class="timeline">${timelineHtml}</div>

          <div style="text-align: center;">
            <a href="/" class="btn">← Back to Home</a>
          </div>
        </div>
      `;

      resultDiv.innerHTML = html;
    }

    function showLoading() {
      document.getElementById('trackResult').innerHTML = `
        <div style="text-align: center; padding: 40px;">
          <div style="border: 3px solid #EDE0CE; border-top: 3px solid #D4920A; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
          <p>Searching for your order...</p>
        </div>
      `;
    }

    function showError(message) {
      document.getElementById('trackResult').innerHTML = `
        <div style="background: #FFEBEE; border-left: 4px solid #F44336; padding: 16px; border-radius: 12px;">
          <strong>⚠️ Error</strong><br>${message}
        </div>
      `;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
  </script>
</body>
</html>

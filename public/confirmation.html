<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Confirmation - NK's Yams</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #FDF6EC 0%, #FAE8C8 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .success-animation {
      text-align: center;
      margin-bottom: 30px;
    }

    .checkmark-circle {
      width: 100px;
      height: 100px;
      background: #4CAF50;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      animation: scaleUp 0.5s ease-out;
    }

    @keyframes scaleUp {
      0% { transform: scale(0); opacity: 0; }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .checkmark {
      font-size: 60px;
      color: white;
    }

    .order-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      margin-bottom: 24px;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      background: linear-gradient(135deg, #7B3F00 0%, #4A2200 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .card-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .order-id {
      background: rgba(212,146,10,0.3);
      padding: 8px 16px;
      border-radius: 50px;
      display: inline-block;
      font-size: 0.9rem;
      margin-top: 12px;
    }

    .card-body {
      padding: 40px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .detail-item {
      padding: 16px;
      background: #FDF6EC;
      border-radius: 16px;
      border-left: 4px solid #D4920A;
    }

    .detail-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #7B3F00;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .detail-value {
      font-size: 1.1rem;
      font-weight: 600;
      color: #2C1A0E;
    }

    .status-tracker {
      margin: 32px 0;
      padding: 24px;
      background: #FDF6EC;
      border-radius: 16px;
    }

    .status-tracker h3 {
      color: #7B3F00;
      margin-bottom: 24px;
    }

    .tracker-steps {
      display: flex;
      justify-content: space-between;
      position: relative;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .step {
      text-align: center;
      flex: 1;
      min-width: 80px;
    }

    .step-icon {
      width: 50px;
      height: 50px;
      background: white;
      border: 3px solid #EDE0CE;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      font-size: 1.2rem;
    }

    .step.active .step-icon {
      background: #D4920A;
      border-color: #D4920A;
      color: white;
    }

    .step.completed .step-icon {
      background: #4CAF50;
      border-color: #4CAF50;
      color: white;
    }

    .step-label {
      font-size: 0.75rem;
      color: #666;
    }

    .action-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    .btn-primary {
      background: #D4920A;
      color: white;
    }

    .btn-primary:hover {
      background: #B8780A;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #7B3F00;
      color: white;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #7B3F00;
      color: #7B3F00;
    }

    .info-alert {
      background: #E3F2FD;
      border-left: 4px solid #2196F3;
      padding: 16px;
      border-radius: 12px;
      margin-top: 24px;
    }

    .loading {
      text-align: center;
      padding: 60px;
    }

    .spinner {
      border: 3px solid #EDE0CE;
      border-top: 3px solid #D4920A;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 640px) {
      .card-body { padding: 24px; }
      .tracker-steps { flex-direction: column; gap: 16px; }
      .step { display: flex; align-items: center; gap: 16px; }
      .step-icon { margin-bottom: 0; }
      .action-buttons { flex-direction: column; }
    }
  </style>
</head>

<body>
  <div class="container" id="confirmationContainer">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading your order confirmation...</p>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('orderId');
    const API_BASE = 'https://nk-s-premium-sale.onrender.com';

    async function loadOrderConfirmation() {
      if (!orderId) {
        window.location.href = '/';
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/api/orders/${orderId}`);
        const data = await response.json();

        if (!data.success || !data.order) {
          throw new Error('Order not found');
        }

        const order = data.order;
        displayConfirmation(order);
      } catch (error) {
        displayError();
      }
    }

    function displayConfirmation(order) {
      const container = document.getElementById('confirmationContainer');
      const orderDate = new Date(order.createdAt);
      const formattedDate = orderDate.toLocaleDateString('en-NG', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });

      const statusSteps = {
        'pending': ['order-placed'],
        'confirmed': ['order-placed', 'confirmed'],
        'dispatched': ['order-placed', 'confirmed', 'dispatched'],
        'delivered': ['order-placed', 'confirmed', 'dispatched', 'delivered']
      };

      const completedSteps = statusSteps[order.status] || ['order-placed'];

      const html = `
        <div class="success-animation">
          <div class="checkmark-circle">
            <div class="checkmark">✓</div>
          </div>
        </div>

        <div class="order-card">
          <div class="card-header">
            <h1>🎉 Order Confirmed!</h1>
            <p>Thank you for choosing NK's Premium Yams</p>
            <div class="order-id">📦 Order ID: #${order.orderId}</div>
          </div>

          <div class="card-body">
            <div class="details-grid">
              <div class="detail-item">
                <div class="detail-label">Customer Name</div>
                <div class="detail-value">${escapeHtml(order.customerName)}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Phone Number</div>
                <div class="detail-value">${order.phone}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Delivery Address</div>
                <div class="detail-value">${escapeHtml(order.deliveryAddress)}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Order Date</div>
                <div class="detail-value">${formattedDate}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Yam Type</div>
                <div class="detail-value">${order.yamType}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Quantity</div>
                <div class="detail-value">${order.quantity} tuber(s)</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Your Price per Tuber</div>
                <div class="detail-value" style="color: #D4920A;">₦${order.pricePerTuber.toLocaleString('en-NG')}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Total Amount</div>
                <div class="detail-value" style="font-size: 1.4rem; color: #D4920A;">₦${order.totalPrice.toLocaleString('en-NG')}</div>
              </div>
            </div>

            <div class="status-tracker">
              <h3>📋 Order Status</h3>
              <div class="tracker-steps">
                <div class="step ${completedSteps.includes('order-placed') ? 'completed' : ''}">
                  <div class="step-icon">📝</div>
                  <div class="step-label">Order Placed</div>
                </div>
                <div class="step ${completedSteps.includes('confirmed') ? 'completed' : ''}">
                  <div class="step-icon">✓</div>
                  <div class="step-label">Confirmed</div>
                </div>
                <div class="step ${completedSteps.includes('dispatched') ? 'completed' : ''}">
                  <div class="step-icon">🚚</div>
                  <div class="step-label">Dispatched</div>
                </div>
                <div class="step ${completedSteps.includes('delivered') ? 'completed' : ''}">
                  <div class="step-icon">🏠</div>
                  <div class="step-label">Delivered</div>
                </div>
              </div>
            </div>

            <div class="info-alert">
              <strong>📞 What's next?</strong><br>
              We'll contact you within 24 hours to confirm your delivery schedule. 
              Save your Order ID <strong>#${order.orderId}</strong> to track your order status.
            </div>

            <div class="action-buttons">
              <a href="/track.html?orderId=${order.orderId}" class="btn btn-primary">🔍 Track Order</a>
              <a href="/" class="btn btn-secondary">🛒 Continue Shopping</a>
              <button onclick="window.print()" class="btn btn-outline">🖨️ Print Receipt</button>
            </div>
          </div>
        </div>
      `;

      container.innerHTML = html;
    }

    function displayError() {
      const container = document.getElementById('confirmationContainer');
      container.innerHTML = `
        <div class="order-card">
          <div class="card-header" style="background: linear-gradient(135deg, #c62828 0%, #8e0000 100%);">
            <h1>😕 Order Not Found</h1>
          </div>
          <div class="card-body" style="text-align: center;">
            <p style="margin-bottom: 24px;">We couldn't find your order. Please check your order ID or contact support.</p>
            <a href="/" class="btn btn-primary">Return to Home</a>
          </div>
        </div>
      `;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    loadOrderConfirmation();
  </script>
</body>
</html>
